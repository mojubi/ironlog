<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IRONLOG">
<link rel="manifest" href="/ironlog/manifest.json">
<link rel="apple-touch-icon" href="/ironlog/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<title>IRONLOG</title>
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26; --border: #2a2a3a;
    --accent: #e8ff47; --accent2: #47ffa0; --accent3: #ff6b47;
    --text: #e8e8f0; --muted: #6a6a80; --danger: #ff4757;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { background:var(--bg); color:var(--text); font-family:'JetBrains Mono','Fira Code',monospace; min-height:100vh; overscroll-behavior:none; }
  body { padding-bottom: env(safe-area-inset-bottom, 20px); padding-left: env(safe-area-inset-left, 0px); padding-right: env(safe-area-inset-right, 0px); }

  /* ─── Scrollbar ─── */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  /* ─── Header ─── */
  .header { background:linear-gradient(135deg, var(--surface) 0%, var(--bg) 100%); border-bottom:1px solid var(--border); padding:16px 20px; padding-top:calc(env(safe-area-inset-top, 0px) + 16px); position:sticky; top:0; z-index:100; }
  .header-inner { display:flex; align-items:center; justify-content:space-between; max-width:600px; margin:0 auto; }
  .logo { font-size:22px; font-weight:800; color:var(--accent); letter-spacing:-1px; font-family:'Space Grotesk',sans-serif; }
  .logo span { color:var(--text); }
  .logo-sub { font-size:10px; color:var(--muted); letter-spacing:2px; margin-top:2px; }
  .nav { display:flex; gap:4px; }
  .nav-btn { background:transparent; color:var(--muted); border:1px solid var(--border); border-radius:6px; width:38px; height:38px; font-size:18px; cursor:pointer; transition:all .15s; }
  .nav-btn.active { background:var(--accent); color:var(--bg); border-color:var(--accent); }

  /* ─── Content ─── */
  .content { max-width:600px; margin:0 auto; padding:20px 16px; }
  .section-label { font-size:11px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; }

  /* ─── Stats Grid ─── */
  .stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:24px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px 14px; text-align:center; }
  .stat-value { font-size:24px; font-weight:800; }
  .stat-label { font-size:10px; color:var(--muted); letter-spacing:1px; margin-top:4px; text-transform:uppercase; }

  /* ─── Day Cards ─── */
  .day-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .day-card { background:linear-gradient(135deg, var(--surface2) 0%, var(--surface) 100%); border:1px solid var(--border); border-radius:10px; padding:16px 14px; cursor:pointer; text-align:left; transition:all .15s; }
  .day-card:active { transform:scale(.97); }
  .day-card-title { font-size:13px; font-weight:700; color:var(--text); margin-bottom:4px; }
  .day-card-sub { font-size:11px; color:var(--muted); }

  /* ─── Exercise Row ─── */
  .ex-row { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; }
  .ex-name { font-size:13px; font-weight:600; }
  .ex-meta { font-size:11px; color:var(--muted); }
  .ex-remove { background:none; border:none; color:var(--danger); opacity:.5; cursor:pointer; font-size:18px; padding:4px 8px; }

  /* ─── Badge ─── */
  .badge { font-size:11px; font-weight:700; padding:2px 8px; border-radius:4px; letter-spacing:.5px; text-transform:uppercase; display:inline-block; }
  .badge-compound { background:#47ffa018; color:var(--accent2); }
  .badge-isolation { background:#6a6a8018; color:var(--muted); }
  .badge-cardio { background:#ff6b4718; color:var(--accent3); }
  .badge-default { background:#e8ff4718; color:var(--accent); }
  .badge-green { background:#47ffa018; color:var(--accent2); }

  /* ─── Buttons ─── */
  .btn { border:none; cursor:pointer; font-family:'JetBrains Mono',monospace; font-weight:700; letter-spacing:.5px; transition:all .15s; border-radius:6px; }
  .btn:active { transform:scale(.97); }
  .btn-primary { background:var(--accent); color:#0a0a0f; font-size:13px; padding:10px 18px; }
  .btn-primary-lg { background:var(--accent); color:#0a0a0f; font-size:15px; padding:14px 28px; width:100%; }
  .btn-secondary { background:var(--surface2); color:var(--text); font-size:13px; padding:10px 18px; border:1px solid var(--border); }
  .btn-danger { background:#ff475720; color:var(--danger); font-size:11px; padding:6px 12px; border:1px solid #ff475740; }
  .btn-ghost { background:transparent; color:var(--muted); font-size:11px; padding:6px 12px; }
  .btn-full { width:100%; }

  /* ─── Input ─── */
  .input { background:var(--surface); border:1px solid var(--border); border-radius:6px; color:var(--text); padding:10px 14px; font-size:14px; font-family:'JetBrains Mono',monospace; outline:none; width:100%; }
  .input:focus { border-color:var(--accent); }
  select.input { appearance:none; }

  /* ─── Day Tabs ─── */
  .day-tabs { display:flex; gap:4px; margin-bottom:16px; overflow-x:auto; padding-bottom:4px; -webkit-overflow-scrolling:touch; }
  .day-tab { background:var(--surface); color:var(--muted); border:1px solid var(--border); border-radius:6px; padding:8px 14px; font-size:11px; font-weight:700; cursor:pointer; white-space:nowrap; font-family:'JetBrains Mono',monospace; flex-shrink:0; }
  .day-tab.active { background:var(--accent); color:var(--bg); border-color:var(--accent); }

  /* ─── Workout Logging ─── */
  .workout-exercise { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:10px; }
  .set-grid { display:grid; grid-template-columns:40px 1fr 1fr; gap:6px; }
  .set-header { font-size:10px; color:var(--muted); text-align:center; }
  .set-num { display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--muted); }
  .set-input { background:var(--surface2); border:1px solid var(--border); border-radius:4px; color:var(--text); padding:8px 10px; font-size:14px; font-family:'JetBrains Mono',monospace; text-align:center; outline:none; width:100%; }
  .set-input:focus { border-color:var(--accent); }
  .last-session { font-size:10px; color:var(--accent2); margin-top:6px; }

  /* ─── Progress Chips ─── */
  .chip-wrap { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:16px; }
  .chip { background:var(--surface); color:var(--muted); border:1px solid var(--border); border-radius:20px; padding:6px 12px; font-size:11px; font-weight:600; cursor:pointer; font-family:'JetBrains Mono',monospace; }
  .chip.active { background:var(--accent); color:var(--bg); border-color:var(--accent); }

  /* ─── Chart Container ─── */
  .chart-box { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:12px; }
  .chart-canvas { width:100%; height:180px; }

  /* ─── PR Grid ─── */
  .pr-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .pr-card { text-align:center; }
  .pr-value { font-size:20px; font-weight:800; }
  .pr-label { font-size:10px; color:var(--muted); }

  /* ─── Log Row ─── */
  .log-row { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; }

  /* ─── Add Exercise Form ─── */
  .add-form { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:16px; margin-top:10px; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .form-full { grid-column:1 / -1; }

  /* ─── Misc ─── */
  .empty { color:var(--muted); font-size:13px; text-align:center; padding:40px; }
  .mt-8 { margin-top:8px; } .mt-10 { margin-top:10px; } .mt-16 { margin-top:16px; } .mt-20 { margin-top:20px; } .mt-24 { margin-top:24px; }
  .mb-4 { margin-bottom:4px; } .mb-8 { margin-bottom:8px; } .mb-10 { margin-bottom:10px; } .mb-16 { margin-bottom:16px; }
  .flex-between { display:flex; justify-content:space-between; align-items:center; }
  .gap-8 { gap:8px; } .flex { display:flex; } .gap-4 { gap:4px; } .items-center { align-items:center; }
  .hidden { display:none; }
  .text-center { text-align:center; }

  @media (max-width: 400px) {
    .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .stat-value { font-size: 20px; }
    .day-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ─── Header ─── -->
<div class="header">
  <div class="header-inner">
    <div>
      <div class="logo">◆ IRON<span>LOG</span></div>
      <div class="logo-sub">WORKOUT TRACKER</div>
    </div>
    <div class="nav">
      <button class="nav-btn active" data-view="dashboard" onclick="switchView('dashboard')">◉</button>
      <button class="nav-btn" data-view="plan" onclick="switchView('plan')">▤</button>
      <button class="nav-btn" data-view="progress" onclick="switchView('progress')">◈</button>
    </div>
  </div>
</div>

<div class="content">
  <!-- Views get rendered here -->
  <div id="app"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// ─── STATE & DATA ───
// ═══════════════════════════════════════════════

const DEFAULT_PLAN = {
  name: "Hypertrophie & Kraft (PPL + Cardio)",
  days: [
    {
      name: "Push (Brust, Schultern, Trizeps)",
      exercises: [
        { name:"Bankdrücken", sets:4, reps:"6-8", muscle:"Brust", type:"compound" },
        { name:"Schrägbank Kurzhantel", sets:3, reps:"8-12", muscle:"Obere Brust", type:"compound" },
        { name:"Butterfly Maschine", sets:3, reps:"12-15", muscle:"Brust", type:"isolation" },
        { name:"Schulterdrücken Maschine", sets:4, reps:"8-10", muscle:"Schultern", type:"compound" },
        { name:"Seitheben Kabel", sets:3, reps:"12-15", muscle:"Seitl. Schulter", type:"isolation" },
        { name:"Trizeps Pushdown", sets:3, reps:"10-12", muscle:"Trizeps", type:"isolation" },
        { name:"Overhead Trizeps Extension", sets:3, reps:"12-15", muscle:"Trizeps", type:"isolation" },
      ]
    },
    {
      name: "Pull (Rücken, Bizeps)",
      exercises: [
        { name:"Klimmzüge / Latzug", sets:4, reps:"6-10", muscle:"Latissimus", type:"compound" },
        { name:"Rudern Maschine", sets:4, reps:"8-12", muscle:"Mittl. Rücken", type:"compound" },
        { name:"Facepulls Kabel", sets:3, reps:"15-20", muscle:"Hintere Schulter", type:"isolation" },
        { name:"Lat Pulldown eng", sets:3, reps:"10-12", muscle:"Latissimus", type:"compound" },
        { name:"Bizeps Curls Langhantel", sets:3, reps:"8-12", muscle:"Bizeps", type:"isolation" },
        { name:"Hammer Curls", sets:3, reps:"10-12", muscle:"Bizeps", type:"isolation" },
      ]
    },
    {
      name: "Legs (Beine, Waden)",
      exercises: [
        { name:"Kniebeugen", sets:4, reps:"6-8", muscle:"Quadrizeps", type:"compound" },
        { name:"Rumänisches Kreuzheben", sets:4, reps:"8-10", muscle:"Hamstrings", type:"compound" },
        { name:"Beinpresse", sets:3, reps:"10-12", muscle:"Quadrizeps", type:"compound" },
        { name:"Beinbeuger Maschine", sets:3, reps:"12-15", muscle:"Hamstrings", type:"isolation" },
        { name:"Beinstrecker Maschine", sets:3, reps:"12-15", muscle:"Quadrizeps", type:"isolation" },
        { name:"Wadenheben stehend", sets:4, reps:"12-15", muscle:"Waden", type:"isolation" },
      ]
    },
    {
      name: "Cardio & Core",
      exercises: [
        { name:"Laufband (Intervalle)", sets:1, reps:"20 min", muscle:"Ausdauer", type:"cardio" },
        { name:"Rudergerät", sets:1, reps:"10 min", muscle:"Ausdauer", type:"cardio" },
        { name:"Planks", sets:3, reps:"45-60s", muscle:"Core", type:"isolation" },
        { name:"Cable Crunches", sets:3, reps:"15-20", muscle:"Bauch", type:"isolation" },
        { name:"Hanging Leg Raises", sets:3, reps:"12-15", muscle:"Unterer Bauch", type:"isolation" },
      ]
    }
  ],
  schedule: "Push → Pull → Legs → Cardio → Push → Pull → Ruhetag"
};

let state = {
  view: 'dashboard',
  plan: JSON.parse(JSON.stringify(DEFAULT_PLAN)),
  logs: [],
  activeDay: 0,
  workout: null,
  selectedExercise: null,
  showAddForm: false,
};

function loadData() {
  try {
    const raw = localStorage.getItem('ironlog-data');
    if (raw) {
      const d = JSON.parse(raw);
      if (d.plan) state.plan = d.plan;
      if (d.logs) state.logs = d.logs;
    }
  } catch(e) {}
}

function saveData() {
  try {
    localStorage.setItem('ironlog-data', JSON.stringify({ plan: state.plan, logs: state.logs }));
  } catch(e) {}
}

function getToday() { return new Date().toISOString().slice(0, 10); }

// ═══════════════════════════════════════════════
// ─── ANALYTICS ───
// ═══════════════════════════════════════════════

function getStats() {
  const total = state.logs.length;
  const now = new Date();
  const thisWeek = state.logs.filter(l => (now - new Date(l.date)) / 864e5 <= 7).length;
  let totalVolume = 0;
  state.logs.forEach(l => l.entries.forEach(e => e.logged.forEach(s => {
    totalVolume += (Number(s.weight)||0) * (Number(s.reps)||0);
  })));
  return { total, thisWeek, totalVolume };
}

function getExerciseHistory(name) {
  const hist = [];
  state.logs.forEach(log => {
    log.entries.forEach(entry => {
      if (entry.name === name) {
        const valid = entry.logged.filter(s => s.weight && s.reps);
        if (valid.length) {
          hist.push({
            date: log.date,
            maxWeight: Math.max(...valid.map(s => Number(s.weight))),
            totalVolume: valid.reduce((s,v) => s + Number(v.weight)*Number(v.reps), 0),
            sets: valid.length
          });
        }
      }
    });
  });
  return hist;
}

function getWeeklyVolume() {
  const weeks = {};
  state.logs.forEach(log => {
    const d = new Date(log.date);
    const ws = new Date(d); ws.setDate(d.getDate() - d.getDay() + 1);
    const key = ws.toISOString().slice(0,10);
    if (!weeks[key]) weeks[key] = { week:key, volume:0, sessions:0 };
    weeks[key].sessions++;
    log.entries.forEach(e => e.logged.forEach(s => {
      if (s.weight && s.reps) weeks[key].volume += Number(s.weight)*Number(s.reps);
    }));
  });
  return Object.values(weeks).sort((a,b) => a.week.localeCompare(b.week)).slice(-8);
}

function getAllExercises() {
  const s = new Set();
  state.plan.days.forEach(d => d.exercises.forEach(e => s.add(e.name)));
  state.logs.forEach(l => l.entries.forEach(e => s.add(e.name)));
  return [...s].sort();
}

// ═══════════════════════════════════════════════
// ─── SIMPLE CANVAS CHARTS ───
// ═══════════════════════════════════════════════

function drawBarChart(canvasId, data, key, color) {
  requestAnimationFrame(() => {
    const canvas = document.getElementById(canvasId);
    if (!canvas || !data.length) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    const W = rect.width, H = rect.height;
    const pad = { t:10, r:10, b:30, l:50 };
    const cW = W - pad.l - pad.r, cH = H - pad.t - pad.b;
    const max = Math.max(...data.map(d => d[key])) * 1.1 || 1;
    const barW = Math.min(cW / data.length * 0.7, 40);
    const gap = cW / data.length;

    ctx.clearRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = '#2a2a3a'; ctx.lineWidth = 0.5;
    for (let i = 0; i <= 4; i++) {
      const y = pad.t + (cH / 4) * i;
      ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
      ctx.fillStyle = '#6a6a80'; ctx.font = '10px JetBrains Mono';
      ctx.textAlign = 'right'; ctx.fillText(Math.round(max - (max/4)*i), pad.l - 6, y + 4);
    }

    // Bars
    data.forEach((d, i) => {
      const x = pad.l + gap * i + (gap - barW) / 2;
      const h = (d[key] / max) * cH;
      const y = pad.t + cH - h;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(x, y, barW, h, [4, 4, 0, 0]);
      ctx.fill();
      // Label
      ctx.fillStyle = '#6a6a80'; ctx.font = '10px JetBrains Mono'; ctx.textAlign = 'center';
      ctx.fillText(d.date ? d.date.slice(5) : d.week?.slice(5) || '', x + barW/2, H - 8);
    });
  });
}

function drawLineChart(canvasId, data, key, color) {
  requestAnimationFrame(() => {
    const canvas = document.getElementById(canvasId);
    if (!canvas || !data.length) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    const W = rect.width, H = rect.height;
    const pad = { t:10, r:10, b:30, l:50 };
    const cW = W - pad.l - pad.r, cH = H - pad.t - pad.b;
    const vals = data.map(d => d[key]);
    const min = Math.min(...vals) * 0.9, max = Math.max(...vals) * 1.1 || 1;
    const range = max - min || 1;

    ctx.clearRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = '#2a2a3a'; ctx.lineWidth = 0.5;
    for (let i = 0; i <= 4; i++) {
      const y = pad.t + (cH / 4) * i;
      ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
      ctx.fillStyle = '#6a6a80'; ctx.font = '10px JetBrains Mono';
      ctx.textAlign = 'right'; ctx.fillText(Math.round(max - (range/4)*i), pad.l - 6, y + 4);
    }

    // Line
    const gap = data.length > 1 ? cW / (data.length - 1) : cW / 2;
    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineJoin = 'round';
    ctx.beginPath();
    data.forEach((d, i) => {
      const x = pad.l + gap * i;
      const y = pad.t + cH - ((d[key] - min) / range) * cH;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    // Dots + labels
    data.forEach((d, i) => {
      const x = pad.l + gap * i;
      const y = pad.t + cH - ((d[key] - min) / range) * cH;
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#0a0a0f';
      ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#6a6a80'; ctx.font = '10px JetBrains Mono'; ctx.textAlign = 'center';
      ctx.fillText(d.date?.slice(5) || '', x, H - 8);
    });
  });
}

// ═══════════════════════════════════════════════
// ─── RENDERING ───
// ═══════════════════════════════════════════════

function switchView(v) {
  if (v !== 'workout') state.view = v;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  render();
}

function h(tag, attrs, ...children) {
  const parts = [`<${tag}`];
  if (attrs) Object.entries(attrs).forEach(([k,v]) => { if (v !== undefined && v !== null) parts.push(` ${k}="${v}"`); });
  parts.push('>');
  children.forEach(c => { if (c !== null && c !== undefined) parts.push(String(c)); });
  if (!['input','br','hr','img','canvas'].includes(tag)) parts.push(`</${tag}>`);
  return parts.join('');
}

function badgeClass(type) {
  return type === 'compound' ? 'badge-compound' : type === 'cardio' ? 'badge-cardio' : 'badge-isolation';
}

function renderDashboard() {
  const stats = getStats();
  const weeklyVol = getWeeklyVolume();
  const recentLogs = state.logs.slice(-5).reverse();

  let html = '';

  // Stats
  html += `<div class="stats-grid">
    <div class="stat-card"><div class="stat-value" style="color:var(--accent)">${stats.total}</div><div class="stat-label">Sessions</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--accent2)">${stats.thisWeek}</div><div class="stat-label">Diese Woche</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--accent3)">${stats.totalVolume.toLocaleString()}</div><div class="stat-label">Volumen (kg)</div></div>
  </div>`;

  // Quick start
  html += `<div class="mb-16"><div class="section-label">Workout starten</div><div class="day-grid">`;
  state.plan.days.forEach((day, i) => {
    const short = day.name.split(' (')[0];
    html += `<div class="day-card" onclick="startWorkout(${i})">
      <div class="day-card-title">${short}</div>
      <div class="day-card-sub">${day.exercises.length} Übungen</div>
    </div>`;
  });
  html += `</div></div>`;

  // Weekly chart
  if (weeklyVol.length) {
    html += `<div class="chart-box"><div class="section-label">Wöchentliches Volumen (kg)</div>
      <canvas id="weekly-chart" class="chart-canvas"></canvas></div>`;
  }

  // Recent logs
  if (recentLogs.length) {
    html += `<div class="mt-20"><div class="section-label">Letzte Workouts</div>`;
    recentLogs.forEach(log => {
      const sets = log.entries.reduce((s,e) => s + e.logged.filter(l => l.weight).length, 0);
      html += `<div class="log-row">
        <div><div style="font-size:13px;font-weight:600">${log.dayName.split(' (')[0]}</div>
        <div style="font-size:11px;color:var(--muted)">${log.date} · ${log.duration||'?'} min</div></div>
        <span class="badge badge-green">${sets} Sets</span>
      </div>`;
    });
    html += `</div>`;
  }

  html += `<div class="mt-24 text-center"><button class="btn btn-ghost" onclick="resetAll()">Alle Daten zurücksetzen</button></div>`;

  return html;
}

function renderPlan() {
  const plan = state.plan;
  const day = plan.days[state.activeDay];

  let html = `<div class="mb-16">
    <div style="font-size:18px;font-weight:800;font-family:'Space Grotesk',sans-serif">${plan.name}</div>
    <div style="font-size:12px;color:var(--muted);margin-top:4px">Rotation: ${plan.schedule}</div>
  </div>`;

  // Day tabs
  html += `<div class="day-tabs">`;
  plan.days.forEach((d, i) => {
    html += `<div class="day-tab${i===state.activeDay?' active':''}" onclick="setActiveDay(${i})">${d.name.split(' (')[0]}</div>`;
  });
  html += `</div>`;

  // Exercises
  day.exercises.forEach((ex, i) => {
    html += `<div class="ex-row">
      <div style="flex:1">
        <div class="flex items-center gap-8 mb-4">
          <span class="ex-name">${ex.name}</span>
          <span class="badge ${badgeClass(ex.type)}">${ex.type}</span>
        </div>
        <div class="ex-meta">${ex.muscle} · ${ex.sets}×${ex.reps}</div>
      </div>
      <button class="ex-remove" onclick="removeExercise(${state.activeDay},${i})">×</button>
    </div>`;
  });

  // Add exercise
  if (state.showAddForm) {
    html += `<div class="add-form"><div class="form-grid">
      <div class="form-full"><input class="input" id="new-name" placeholder="Übungsname"></div>
      <input class="input" id="new-muscle" placeholder="Muskelgruppe">
      <input class="input" id="new-reps" placeholder="Reps (z.B. 8-12)" value="10-12">
      <input class="input" id="new-sets" type="number" placeholder="Sets" value="3">
      <select class="input" id="new-type"><option value="compound">Compound</option><option value="isolation" selected>Isolation</option><option value="cardio">Cardio</option></select>
    </div>
    <div class="flex gap-8 mt-10">
      <button class="btn btn-primary" onclick="addExercise()">Hinzufügen</button>
      <button class="btn btn-secondary" onclick="toggleAddForm()">Abbrechen</button>
    </div></div>`;
  } else {
    html += `<div class="mt-10"><button class="btn btn-secondary btn-full" onclick="toggleAddForm()">+ Übung hinzufügen</button></div>`;
  }

  html += `<div class="mt-16"><button class="btn btn-primary-lg" onclick="startWorkout(${state.activeDay})">▶ ${day.name.split(' (')[0]} starten</button></div>`;

  return html;
}

function renderWorkout() {
  const w = state.workout;
  if (!w) return '';

  let html = `<div class="flex-between mb-16">
    <div><div style="font-size:16px;font-weight:800;font-family:'Space Grotesk',sans-serif">${w.dayName.split(' (')[0]}</div>
    <div style="font-size:11px;color:var(--muted)">${w.date}</div></div>
    <button class="btn btn-danger" onclick="cancelWorkout()">Abbrechen</button>
  </div>`;

  w.entries.forEach((ex, ei) => {
    html += `<div class="workout-exercise">
      <div class="flex-between mb-10">
        <div><span style="font-size:14px;font-weight:700">${ex.name}</span>
        <span style="font-size:11px;color:var(--muted);margin-left:8px">${ex.muscle}</span></div>
        <span class="badge badge-default">${ex.sets}×${ex.reps}</span>
      </div>
      <div class="set-grid mb-4">
        <div class="set-header">SET</div><div class="set-header">KG</div><div class="set-header">REPS</div>
      </div>`;

    ex.logged.forEach((set, si) => {
      html += `<div class="set-grid" style="margin-bottom:4px">
        <div class="set-num">${si+1}</div>
        <input class="set-input" type="number" inputmode="decimal" value="${set.weight}" placeholder="—" onchange="updateSet(${ei},${si},'weight',this.value)">
        <input class="set-input" type="number" inputmode="numeric" value="${set.reps}" placeholder="—" onchange="updateSet(${ei},${si},'reps',this.value)">
      </div>`;
    });

    // Last session
    const hist = getExerciseHistory(ex.name);
    if (hist.length) {
      const last = hist[hist.length-1];
      html += `<div class="last-session">Letztes Mal: ${last.maxWeight}kg max · ${last.totalVolume}kg Volumen</div>`;
    }
    html += `</div>`;
  });

  html += `<button class="btn btn-primary-lg mt-8" onclick="finishWorkout()">✓ Workout abschließen</button>`;
  return html;
}

function renderProgress() {
  const exercises = getAllExercises();
  const sel = state.selectedExercise;

  let html = `<div style="font-size:18px;font-weight:800;font-family:'Space Grotesk',sans-serif" class="mb-16">Fortschritte</div>`;

  html += `<div class="chip-wrap">`;
  exercises.forEach(name => {
    html += `<div class="chip${sel===name?' active':''}" onclick="selectExercise('${name.replace(/'/g, "\\'")}')">${name}</div>`;
  });
  html += `</div>`;

  if (sel) {
    const hist = getExerciseHistory(sel);
    if (!hist.length) {
      html += `<div class="empty">Noch keine Daten für ${sel}</div>`;
    } else {
      // Max weight chart
      html += `<div class="chart-box"><div class="section-label">Max Gewicht (kg)</div>
        <canvas id="weight-chart" class="chart-canvas"></canvas></div>`;
      // Volume chart
      html += `<div class="chart-box"><div class="section-label">Gesamtvolumen (kg)</div>
        <canvas id="vol-chart" class="chart-canvas"></canvas></div>`;
      // PRs
      html += `<div class="chart-box"><div class="section-label mb-8">Personal Records</div>
        <div class="pr-grid">
          <div class="pr-card"><div class="pr-value" style="color:var(--accent)">${Math.max(...hist.map(h=>h.maxWeight))}</div><div class="pr-label">MAX KG</div></div>
          <div class="pr-card"><div class="pr-value" style="color:var(--accent2)">${Math.max(...hist.map(h=>h.totalVolume)).toLocaleString()}</div><div class="pr-label">MAX VOL</div></div>
          <div class="pr-card"><div class="pr-value" style="color:var(--accent3)">${hist.length}</div><div class="pr-label">SESSIONS</div></div>
        </div></div>`;
    }
  } else {
    html += `<div class="empty">Wähle eine Übung, um Fortschritte zu sehen</div>`;
  }

  return html;
}

function render() {
  const app = document.getElementById('app');
  switch(state.view) {
    case 'dashboard': app.innerHTML = renderDashboard(); break;
    case 'plan': app.innerHTML = renderPlan(); break;
    case 'workout': app.innerHTML = renderWorkout(); break;
    case 'progress': app.innerHTML = renderProgress(); break;
  }

  // Draw charts after DOM update
  setTimeout(() => {
    if (state.view === 'dashboard') {
      drawBarChart('weekly-chart', getWeeklyVolume(), 'volume', '#e8ff47');
    }
    if (state.view === 'progress' && state.selectedExercise) {
      const hist = getExerciseHistory(state.selectedExercise);
      drawLineChart('weight-chart', hist, 'maxWeight', '#e8ff47');
      drawBarChart('vol-chart', hist, 'totalVolume', '#47ffa0');
    }
  }, 20);
}

// ═══════════════════════════════════════════════
// ─── ACTIONS ───
// ═══════════════════════════════════════════════

function startWorkout(dayIdx) {
  const day = state.plan.days[dayIdx];
  state.workout = {
    dayIndex: dayIdx, dayName: day.name, date: getToday(), startTime: Date.now(),
    entries: day.exercises.map(ex => ({ ...ex, logged: Array.from({length:ex.sets}, () => ({weight:'',reps:''})) }))
  };
  state.view = 'workout';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  render();
}

function updateSet(ei, si, field, val) {
  state.workout.entries[ei].logged[si][field] = val;
}

function finishWorkout() {
  const log = { ...state.workout, endTime:Date.now(), duration:Math.round((Date.now()-state.workout.startTime)/6e4) };
  state.logs.push(log);
  saveData();
  state.workout = null;
  state.view = 'dashboard';
  document.querySelector('[data-view="dashboard"]').classList.add('active');
  render();
}

function cancelWorkout() {
  state.workout = null;
  state.view = 'dashboard';
  document.querySelector('[data-view="dashboard"]').classList.add('active');
  render();
}

function setActiveDay(i) { state.activeDay = i; render(); }

function toggleAddForm() { state.showAddForm = !state.showAddForm; render(); }

function addExercise() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) return;
  state.plan.days[state.activeDay].exercises.push({
    name,
    muscle: document.getElementById('new-muscle').value.trim() || '—',
    reps: document.getElementById('new-reps').value || '10-12',
    sets: Number(document.getElementById('new-sets').value) || 3,
    type: document.getElementById('new-type').value
  });
  state.showAddForm = false;
  saveData(); render();
}

function removeExercise(dayIdx, exIdx) {
  state.plan.days[dayIdx].exercises.splice(exIdx, 1);
  saveData(); render();
}

function selectExercise(name) {
  state.selectedExercise = state.selectedExercise === name ? null : name;
  render();
}

function resetAll() {
  if (confirm('Alle Daten wirklich löschen?')) {
    state.plan = JSON.parse(JSON.stringify(DEFAULT_PLAN));
    state.logs = [];
    state.workout = null;
    state.selectedExercise = null;
    localStorage.removeItem('ironlog-data');
    render();
  }
}

// ─── INIT ───
loadData();
render();

// ─── Service Worker Registration ───
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/ironlog/sw.js', { scope: '/ironlog/' }).catch(() => {});
}
</script>
</body>
</html>
